

services:
  frontend:
    build: ./frontend
    container_name: frontend_react
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: backend_flask
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: resort_db
    depends_on:
      - db

  db:
    image: mariadb:12.2
    container_name: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: resort_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql     # named volume, fresh initialization
      - ./db-scripts:/docker-entrypoint-initdb.d

volumes:
  db_data: